services:
  garmin-nostra:
    build: .
    container_name: garmin-nostra
    restart: unless-stopped
    volumes:
      - ~/data/garminnostra:/data
      # Split out from ~/data/garminnostra so nostra-mcp can bind-mount the
      # rest of that directory (db, gpx, fit, maps) without ever seeing these
      # Garmin/Wahoo OAuth tokens. Mounted at a top-level path, not /data/tokens:
      # nesting it under /data would make Docker create a "tokens" mountpoint
      # directory on the /data bind's host side (~/data/garminnostra/tokens)
      # to mount onto, which would then be visible -- empty, but visible -- to
      # anyone bind-mounting all of ~/data/garminnostra elsewhere. token_dir in
      # config.toml is now /tokens accordingly.
      - ~/data/garmin-tokens:/tokens
      - ./config.toml:/app/config.toml:ro
    environment:
      - CONFIG_FILE=/app/config.toml
      - TZ=Europe/Berlin
      # Secrets can be passed via env vars and referenced in config.toml
      # with the "env:" prefix (e.g. mastodon_access_token = "env:MASTODON_TOKEN").
      # Uncomment and fill in as needed:
      # - MASTODON_TOKEN=your_token_here
      # - CALDAV_PASSWORD=your_password_here
      # Wahoo credentials — one set of env vars per Wahoo user.
      # Each [[users]] block in config.toml references its own vars, e.g.:
      #   wahoo_client_id   = "env:CAROL_WAHOO_CLIENT_ID"
      #   wahoo_refresh_token = "env:CAROL_WAHOO_REFRESH_TOKEN"
      # - CAROL_WAHOO_CLIENT_ID=your_client_id
      # - CAROL_WAHOO_CLIENT_SECRET=your_client_secret
      # - CAROL_WAHOO_REFRESH_TOKEN=your_refresh_token
      # - DAVE_WAHOO_CLIENT_ID=your_client_id
      # - DAVE_WAHOO_CLIENT_SECRET=your_client_secret
      # - DAVE_WAHOO_REFRESH_TOKEN=your_refresh_token
